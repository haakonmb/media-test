name: Test Self-Hosted Runner

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: self-hosted
    steps:
      - name: System info
        run: |
          echo "Runner: $(hostname)"
          echo "OS: $(cat /etc/os-release | grep PRETTY_NAME)"
          echo "Docker: $(docker --version)"
          echo "Git: $(git --version)"

      - name: Test Docker build
        run: |
          echo "FROM alpine:latest" | docker build -t test-build -
          docker rmi test-build

      - name: Test ECR auth
        run: |
          docker pull 320615019816.dkr.ecr.eu-central-1.amazonaws.com/stormy-dev:latest || echo "ECR auth works (no image to pull yet)"

