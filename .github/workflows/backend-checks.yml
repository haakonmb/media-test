name: Backend checks

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      notify_on_failure:
        required: true
        type: boolean

permissions:
  contents: read

jobs:
  lint-and-types:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: "26"
          cache: "npm"

      - name: Install dependencies
        run: npm ci
      - name: Check migration numbers do not duplicate main
        run: ./scripts/check-migration-numbers.sh
      - name: Run lint
        run: npm run lint
      - name: Run type check
        run: npm run typecheck
      - name: Run smoke test
        run: npm run test:smoke

  verify-specs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "26"
          cache: "npm"

      - name: Install dependencies
        run: npm ci
      - name: Regenerate OpenAPI spec
        run: npm run openapi:static:generate
      - name: Fail if spec drifted from committed copy
        run: git diff --exit-code -- openapi/

  test:
    # Full test suite (unit + integration + e2e) against a real Postgres +
    # LocalStack stack booted via docker compose. Migrations are applied
    # before tests so integration suites see the live schema.
    runs-on: ubuntu-latest
    needs: [lint-and-types, verify-specs]
    env:
      # NODE_TEST_ENV=ci tells initPools.ts to use the local/CI branch
      # (no SSL, no pgbouncer). Local dev uses NODE_TEST_ENV=localhost
      # in .env to get the same behaviour.
      NODE_TEST_ENV: ci
      PG_HOST: localhost
      PG_PORT: '5432'
      PG_USER: stormy
      PG_PASSWORD: stormy
      PG_DATABASE: stormy
      DYNAMO_VERIFICATION_TABLE: verification-codes-dev
      DYNAMO_CHAT_MEMBERS_TABLE: chat-members-dev
      DYNAMO_USER_PRESENCE_TABLE: user-presence-dev
      DYNAMO_STORY_METADATA_TABLE: story-metadata-dev
      DYNAMO_RECOMMENDED_FOLLOWS_TABLE: recommended-follows-dev
      DYNAMO_RYW_TABLE: ryw-cache-dev
      AWS_ENDPOINT_URL: http://localhost:4566
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "26"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Write .env for compose api service
        # compose.yml's api service declares `env_file: .env`. CI doesn't
        # have a .env (it's gitignored). `docker compose run` only injects
        # what's passed via -e, so the container can't see the job-level
        # env: block by itself. Write a .env populated from job-level vars
        # so PG_USER / PG_PASSWORD / PG_DATABASE reach the migrate command.
        run: |
          cat > .env <<EOF
          PG_HOST=${PG_HOST}
          PG_PORT=${PG_PORT}
          PG_USER=${PG_USER}
          PG_PASSWORD=${PG_PASSWORD}
          PG_DATABASE=${PG_DATABASE}
          DYNAMO_VERIFICATION_TABLE=${DYNAMO_VERIFICATION_TABLE}
          DYNAMO_CHAT_MEMBERS_TABLE=${DYNAMO_CHAT_MEMBERS_TABLE}
          DYNAMO_USER_PRESENCE_TABLE=${DYNAMO_USER_PRESENCE_TABLE}
          DYNAMO_STORY_METADATA_TABLE=${DYNAMO_STORY_METADATA_TABLE}
          DYNAMO_RECOMMENDED_FOLLOWS_TABLE=${DYNAMO_RECOMMENDED_FOLLOWS_TABLE}
          DYNAMO_RYW_TABLE=${DYNAMO_RYW_TABLE}
          AWS_ENDPOINT_URL=${AWS_ENDPOINT_URL}
          AWS_REGION=${AWS_REGION}
          AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
          AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
          EOF

      - name: Boot local stack (db + redis + localstack)
        run: |
          docker compose --profile dev up -d db redis localstack
          # Wait for PG.
          for i in {1..30}; do
            if docker exec stormy-db pg_isready -U stormy -d stormy 2>/dev/null | grep -q 'accepting'; then
              echo "PG ready"; break
            fi
            sleep 2
          done
          # Wait for LocalStack ryw-cache-dev (proof init-aws.sh finished).
          for i in {1..30}; do
            if aws --endpoint-url=http://localhost:4566 --region us-east-1 dynamodb describe-table --table-name ryw-cache-dev >/dev/null 2>&1; then
              echo "LocalStack ready"; break
            fi
            sleep 2
          done

      - name: Install goose
        run: |
          GOOSE_VERSION=3.27.1
          mkdir -p "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          curl -fsSL -o "$HOME/.local/bin/goose" \
            "https://github.com/pressly/goose/releases/download/v${GOOSE_VERSION}/goose_linux_x86_64"
          chmod +x "$HOME/.local/bin/goose"
          "$HOME/.local/bin/goose" -version

      - name: Run migrations
        run: npm run migrate:up

      - name: Run unit + integration tests
        run: npm test

      - name: Run e2e tests
        run: npm run test:e2e

      - name: Build app
        run: npm run build

      - name: Tear down
        if: always()
        run: docker compose --profile dev down -v || true

  notify-failure:
    if: ${{ failure() && (github.event_name == 'workflow_dispatch' || inputs.notify_on_failure) }}
    needs: [lint-and-types, verify-specs, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Notify Slack on checks failure
        uses: ./.github/actions/notify-slack-failure
        with:
          slack-webhook-url: ${{ secrets.SLACK_DEPLOY_WEBHOOK_URL }}
          workflow: ${{ github.workflow }}
          repository: ${{ github.repository }}
          sha: ${{ github.sha }}
          ref-name: ${{ github.ref_name }}
          actor: ${{ github.actor }}
          run-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
